<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic AI</title>
    <style>
        body { margin: 0; background: black; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #answer { font-size: 15vw; font-weight: bold; text-align: center; width: 90%; word-break: break-all; }
        #status { position: fixed; top: 10px; left: 10px; font-size: 14px; color: #555; }
    </style>
</head>
<body onclick="init()">
    <div id="status">TAP TO START</div>
    <div id="answer">READY</div>
    <script>
        let apiKey = ''; 
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.continuous = true;
        recognition.interimResults = true;
        let active = false;

        async function init() {
            if (active) return;
            if (!apiKey) {
                apiKey = prompt("APIキーを入力してください");
                if (!apiKey) return;
            }
            active = true;
            try { 
                recognition.start(); 
                document.getElementById('status').innerText = 'LISTENING...';
                document.getElementById('answer').innerText = 'START';
            } catch (e) {}
        }

        recognition.onresult = (event) => {
            let transcript = event.results[event.results.length - 1][0].transcript;
            document.getElementById('status').innerText = 'YOU: ' + transcript;
            if (event.results[event.results.length - 1].isFinal) {
                if (transcript.includes('は') || transcript.includes('何') || transcript.includes('？')) {
                    askAI(transcript);
                }
            }
        };

        async function askAI(query) {
            const output = document.getElementById('answer');
            output.innerText = 'WAIT...';
            try {
                // モデル名を gemini-1.5-flash にし、URLを v1beta に固定
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `一言で答えて：${query}` }] }] })
                });
                const data = await response.json();
                if (data.error) {
                    output.innerText = "ERR: " + data.error.message;
                } else {
