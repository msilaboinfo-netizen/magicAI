<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic AI</title>
    <style>
        body { margin: 0; background: black; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #answer { font-size: 15vw; font-weight: bold; text-align: center; }
        #status { position: fixed; top: 10px; left: 10px; font-size: 14px; color: #555; }
    </style>
</head>
<body onclick="start()">
    <div id="status">TAP SCREEN</div>
    <div id="answer">READY</div>

    <script>
        const apiKey = 'AIzaSyBiVr0i8fr5ggxUUyeLtXgwq8x45yldkAg';
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.lang = 'ja-JP';
        recognition.continuous = true;
        recognition.interimResults = true;

        function start() {
            recognition.start();
            document.getElementById('status').innerText = 'LISTENING...';
        }

        recognition.onresult = (event) => {
            const speech = event.results[event.results.length - 1][0].transcript;
            document.getElementById('status').innerText = speech; // しゃべった言葉を左上に出す
            
            if (event.results[event.results.length - 1].isFinal) {
                if (speech.includes('何') || speech.includes('教') || speech.includes('は')) {
                    askAI(speech);
                }
            }
        };

        async function askAI(text) {
            const output = document.getElementById('answer');
            output.innerText = 'WAIT...';
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `一言で答えて：${text}` }] }] })
                });
                const data = await res.json();
                output.innerText = data.candidates[0].content.parts[0].text.trim();
            } catch (e) {
                output.innerText = 'ERROR';
            }
        }
        recognition.onend = () => { recognition.start(); };
    </script>
</body>
</html>
