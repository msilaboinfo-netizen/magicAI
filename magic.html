<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic AI</title>
    <style>
        body { margin: 0; background: black; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #answer { font-size: 15vw; font-weight: bold; text-align: center; width: 90%; word-break: break-all; }
        #status { position: fixed; top: 10px; left: 10px; font-size: 14px; color: #444; width: 90%; overflow: hidden; white-space: nowrap; }
    </style>
</head>
<body onclick="forceStart()">
    <div id="status">STATUS: READY (TAP SCREEN)</div>
    <div id="answer">READY</div>

    <script>
        const apiKey = 'AIzaSyBiVr0i8fr5ggxUUyeLtXgwq8x45yldkAg';
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        
        if (!SpeechRecognition) {
            document.getElementById('answer').innerText = 'NOT SUPPORTED';
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true;

        let active = false;

        // iPhoneで確実に起動させるための関数
        function forceStart() {
            if (active) return;
            active = true;
            document.getElementById('status').innerText = 'STATUS: STARTING...';
            try {
                recognition.start();
            } catch (e) {
                console.log(e);
            }
        }

        recognition.onstart = () => {
            document.getElementById('status').innerText = 'STATUS: LISTENING...';
            document.getElementById('answer').innerText = 'START';
        };

        recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            
            // 左上にリアルタイムで表示
            document.getElementById('status').innerText = 'YOU: ' + transcript;

            if (event.results[event.results.length - 1].isFinal) {
                const text = event.results[event.results.length - 1][0].transcript;
                if (text.includes('何') || text.includes('教') || text.includes('は') || text.includes('？')) {
                    askAI(text);
                }
            }
        };

        recognition.onerror = (e) => {
            document.getElementById('status').innerText = 'ERROR: ' + e.error;
            if (e.error === 'not-allowed') {
                alert('マイクを許可してください');
            }
            active = false;
        };

        recognition.onend = () => {
            active = false;
            if (active) recognition.start(); // 自動再開
        };

        async function askAI(query) {
            const output = document.getElementById('answer');
            output.innerText = 'WAIT...';
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `以下の問いに一言で短く答えて。余計な解説は不要：${query}` }] }] })
                });
                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text.trim();
                output.innerText = result;
            } catch (err) {
                output.innerText = 'ERR';
            }
        }
    </script>
</body>
</html>
