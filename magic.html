<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic AI</title>
    <style>
        body { margin: 0; background: black; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #answer { font-size: 15vw; font-weight: bold; text-align: center; width: 90%; word-break: break-all; }
        #status { position: fixed; top: 10px; left: 10px; font-size: 14px; color: #444; }
    </style>
</head>
<body onclick="forceStart()">
    <div id="status">TAP SCREEN</div>
    <div id="answer">READY</div>

    <script>
        // 新しいキーをセットしました
        const apiKey = 'AIzaSyBSvWILCJVLgsZwjoDp1MT-Uu2t0PuoWYc'; 

        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true;
        let active = false;

        function forceStart() {
            if (active) return;
            active = true;
            try { 
                recognition.start(); 
                document.getElementById('status').innerText = 'LISTENING...';
                document.getElementById('answer').innerText = 'START';
            } catch (e) {}
        }

        recognition.onresult = (event) => {
            let transcript = event.results[event.results.length - 1][0].transcript;
            document.getElementById('status').innerText = 'YOU: ' + transcript;
            
            if (event.results[event.results.length - 1].isFinal) {
                // 「は」「何」「教」などの言葉に反応
                if (transcript.includes('は') || transcript.includes('何') || transcript.includes('教') || transcript.includes('？')) {
                    askAI(transcript);
                }
            }
        };

        async function askAI(query) {
            const output = document.getElementById('answer');
            output.innerText = 'WAIT...';
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `以下の問いに一言で短く答えて。余計な解説は不要。：${query}` }] }] })
                });
                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    output.innerText = data.candidates[0].content.parts[0].text.trim();
                } else if (data.error) {
                    output.innerText = 'KEY ERR';
                    console.log(data.error.message);
                }
            } catch (err) {
                output.innerText = 'NET ERR';
            }
        }

        recognition.onend = () => { if (active) recognition.start(); };
    </script>
</body>
</html>
